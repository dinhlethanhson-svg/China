```html
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trò Chơi Luyện Phát Âm Tiếng Trung</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#74b9ff,#a29bfe);
    text-align:center;
    margin:0;
    padding:30px;
}

h1{
    color:white;
    margin-bottom:20px;
}

#gameBox{
    max-width:700px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
}

#word{
    font-size:60px;
    color:#d63031;
    font-weight:bold;
    margin:20px 0;
}

#pinyin{
    font-size:28px;
    color:#0984e3;
    margin-bottom:20px;
}

button{
    padding:12px 25px;
    font-size:20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin:10px;
}

#startBtn{
    background:#00b894;
    color:white;
}

#nextBtn{
    background:#6c5ce7;
    color:white;
}

#result{
    margin-top:20px;
    min-height:60px;
    font-size:24px;
}

.correct{
    color:green;
    font-weight:bold;
}

.wrong{
    color:red;
    font-weight:bold;
}

#score{
    margin-top:20px;
    font-size:28px;
    font-weight:bold;
}

#instruction{
    margin-bottom:20px;
    font-size:18px;
    color:#555;
}
</style>
</head>

<body>

<h1>🎤 TRÒ CHƠI LUYỆN PHÁT ÂM TIẾNG TRUNG</h1>

<div id="gameBox">

<div id="instruction">
Nhìn từ tiếng Trung bên dưới, nhấn nút "Bắt đầu nói" và phát âm thật chính xác.
</div>

<div id="word"></div>
<div id="pinyin"></div>

<button id="startBtn">🎙️ Bắt đầu nói</button>
<button id="nextBtn">➡ Câu tiếp theo</button>

<div id="result"></div>

<div id="score">
Điểm số: <span id="points">0</span>
</div>

</div>

<script>

const words = [
{hanzi:"你好", pinyin:"nǐ hǎo"},
{hanzi:"谢谢", pinyin:"xiè xie"},
{hanzi:"中国", pinyin:"zhōng guó"},
{hanzi:"老师", pinyin:"lǎo shī"},
{hanzi:"学生", pinyin:"xué sheng"},
{hanzi:"朋友", pinyin:"péng you"},
{hanzi:"学校", pinyin:"xué xiào"},
{hanzi:"北京", pinyin:"běi jīng"},
{hanzi:"上海", pinyin:"shàng hǎi"},
{hanzi:"再见", pinyin:"zài jiàn"},
{hanzi:"喜欢", pinyin:"xǐ huān"},
{hanzi:"工作", pinyin:"gōng zuò"},
{hanzi:"电脑", pinyin:"diàn nǎo"},
{hanzi:"手机", pinyin:"shǒu jī"},
{hanzi:"今天", pinyin:"jīn tiān"},
{hanzi:"明天", pinyin:"míng tiān"},
{hanzi:"天气", pinyin:"tiān qì"},
{hanzi:"吃饭", pinyin:"chī fàn"},
{hanzi:"喝水", pinyin:"hē shuǐ"},
{hanzi:"学习", pinyin:"xué xí"}
];

let currentIndex = 0;
let score = 0;

const wordDiv = document.getElementById("word");
const pinyinDiv = document.getElementById("pinyin");
const resultDiv = document.getElementById("result");
const pointsDiv = document.getElementById("points");

function loadWord(){
    wordDiv.textContent = words[currentIndex].hanzi;
    pinyinDiv.textContent = words[currentIndex].pinyin;
    resultDiv.innerHTML = "";
}

loadWord();

const SpeechRecognition =
window.SpeechRecognition ||
window.webkitSpeechRecognition;

if(!SpeechRecognition){
    alert("Trình duyệt của bạn không hỗ trợ nhận diện giọng nói.");
}

const recognition = new SpeechRecognition();

recognition.lang = "zh-CN";
recognition.interimResults = false;
recognition.maxAlternatives = 3;

document.getElementById("startBtn")
.addEventListener("click", ()=>{

    resultDiv.innerHTML =
    "🎧 Đang nghe bạn phát âm...";

    recognition.start();
});

recognition.onresult = function(event){

    const spoken =
    event.results[0][0].transcript.trim();

    const target =
    words[currentIndex].hanzi;

    if(spoken.includes(target)){

        score += 10;

        pointsDiv.textContent = score;

        resultDiv.innerHTML =
        "<span class='correct'>✅ Chính xác!</span><br>" +
        "Bạn đã đọc: " + spoken;

    }else{

        resultDiv.innerHTML =
        "<span class='wrong'>❌ Chưa chính xác!</span><br>" +
        "Bạn đọc: " + spoken +
        "<br>Đáp án đúng: " + target;
    }
};

recognition.onerror = function(event){

    resultDiv.innerHTML =
    "<span class='wrong'>Lỗi nhận diện: "
    + event.error +
    "</span>";
};

document.getElementById("nextBtn")
.addEventListener("click", ()=>{

    currentIndex++;

    if(currentIndex >= words.length){

        alert(
        "🎉 Bạn đã hoàn thành trò chơi!\n\nTổng điểm: "
        + score
        );

        currentIndex = 0;
        score = 0;
        pointsDiv.textContent = 0;
    }

    loadWord();
});

</script>

</body>
</html>
```
